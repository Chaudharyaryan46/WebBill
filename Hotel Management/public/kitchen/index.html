<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Kitchen Display — DineFlow</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=Outfit:wght@700;900&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #f5f5f0;
      color: #1a1a1a;
      min-height: 100vh;
    }

    /* HEADER */
    .header {
      background: white;
      padding: 20px 28px;
      border-bottom: 1px solid #e8e8e0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 10;
      box-shadow: 0 2px 12px rgba(0,0,0,0.04);
    }

    .brand { font-family: 'Outfit', sans-serif; font-size: 1.5rem; font-weight: 900; color: #889E48; }
    .order-count {
      background: #f0f4e8;
      color: #889E48;
      font-weight: 800;
      font-size: 0.9rem;
      padding: 8px 18px;
      border-radius: 20px;
      border: 1.5px solid #889E48;
    }

    /* TABS */
    .tabs {
      display: flex;
      gap: 12px;
      padding: 20px 24px 0;
    }

    .tab {
      padding: 11px 28px;
      border-radius: 14px;
      font-weight: 800;
      font-size: 0.95rem;
      cursor: pointer;
      background: white;
      color: #888;
      border: 1.5px solid #e8e8e0;
      transition: all 0.2s;
    }

    .tab.active {
      background: #889E48;
      color: white;
      border-color: #889E48;
      box-shadow: 0 4px 16px rgba(136,158,72,0.25);
    }

    /* GRID */
    .kot-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
      gap: 20px;
      padding: 20px 24px 40px;
    }

    /* KOT CARD */
    .kot-card {
      background: white;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(0,0,0,0.07);
      animation: fadeUp 0.3s ease-out;
    }

    .kot-card.urgent { border: 2.5px solid #f39c12; }

    .kot-card-header {
      padding: 20px 24px;
      background: #f9f9f6;
      border-bottom: 1px solid #f0f0ea;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .kot-table { font-family: 'Outfit', sans-serif; font-size: 1.6rem; font-weight: 900; }
    .kot-time { font-size: 0.8rem; color: #999; margin-top: 3px; }
    .kot-elapsed {
      font-weight: 800;
      font-size: 0.85rem;
      color: #889E48;
      background: #f0f4e8;
      padding: 6px 14px;
      border-radius: 10px;
    }
    .kot-elapsed.warn { color: #e67e22; background: #fef3e2; }
    .kot-elapsed.urgent { color: #e74c3c; background: #fef0ef; }

    /* KOT ITEMS */
    .kot-items { padding: 16px 24px; }

    .kot-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 12px 0;
      border-bottom: 1px solid #f0f0ea;
    }
    .kot-item:last-child { border-bottom: none; }

    .kot-qty {
      font-family: 'Outfit', sans-serif;
      font-size: 1.6rem;
      font-weight: 900;
      color: #889E48;
      min-width: 36px;
    }

    .kot-item-info { flex: 1; min-width: 0; }
    .kot-name { font-weight: 800; font-size: 1.05rem; }
    .kot-badge { font-size: 0.55rem; margin-right: 4px; }

    .status-btn {
      padding: 10px 18px;
      border-radius: 12px;
      font-weight: 800;
      font-size: 0.78rem;
      text-transform: uppercase;
      border: none;
      cursor: pointer;
      min-width: 110px;
      transition: all 0.2s;
    }
    .status-btn:active { transform: scale(0.95); }
    .status-btn.pending { background: #f0f0f0; color: #888; }
    .status-btn.preparing { background: #e8f0fe; color: #1a73e8; }
    .status-btn.ready { background: #e6f4ea; color: #137333; }

    /* KOT FOOTER */
    .kot-footer {
      padding: 16px 24px 20px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      background: #fafaf7;
      border-top: 1px solid #f0f0ea;
    }

    .btn-prep {
      background: #e8f0fe;
      color: #1a73e8;
      padding: 13px;
      border-radius: 14px;
      font-weight: 800;
      font-size: 0.85rem;
      border: none;
      cursor: pointer;
    }

    .btn-done {
      background: #889E48;
      color: white;
      padding: 13px;
      border-radius: 14px;
      font-weight: 800;
      font-size: 0.85rem;
      border: none;
      cursor: pointer;
      box-shadow: 0 4px 14px rgba(136,158,72,0.2);
    }

    .btn-prep:active, .btn-done:active { transform: scale(0.96); }

    /* EMPTY STATE */
    .empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 100px 20px;
      color: #bbb;
      text-align: center;
    }
    .empty-icon { font-size: 5rem; margin-bottom: 20px; opacity: 0.5; }
    .empty h2 { font-family: 'Outfit', sans-serif; font-size: 1.8rem; margin-bottom: 8px; }

    /* TOAST */
    .toast-wrap {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .toast {
      background: white;
      border-radius: 14px;
      padding: 14px 20px;
      font-weight: 700;
      box-shadow: 0 8px 24px rgba(0,0,0,0.12);
      border-left: 4px solid #889E48;
      animation: slideIn 0.3s ease-out;
      min-width: 240px;
    }
    .toast.error { border-left-color: #e74c3c; }
    .toast.warn { border-left-color: #f39c12; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateX(30px); }
      to { opacity: 1; transform: translateX(0); }
    }
  </style>
</head>
<body>

<div class="toast-wrap" id="toastWrap"></div>

<header class="header">
  <div>
    <div class="brand">🍳 Kitchen</div>
    <div style="font-size:0.75rem; color:#999; margin-top:2px;">DineFlow Display System</div>
  </div>
  <div class="order-count" id="orderCount">0 Active Orders</div>
</header>

<div class="tabs">
  <button class="tab active" onclick="switchTab('pending')">New Requests</button>
  <button class="tab" onclick="switchTab('preparing')">In Progress</button>
</div>

<div id="kotGrid" class="kot-grid"></div>
<div id="emptyState" class="empty" style="display:none">
  <div class="empty-icon">👨‍🍳</div>
  <h2>Kitchen is Clear</h2>
  <p>Waiting for new orders...</p>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="/shared/socket-client.js"></script>
<script>
  const socket = initSocket();

  let kotOrders = [];
  let activeTab = 'pending';

  // INIT
  document.addEventListener('DOMContentLoaded', loadOrders);
  setInterval(() => renderGrid(), 60000);

  async function loadOrders() {
    try {
      kotOrders = await api('/api/kitchen/pending');
      renderGrid();
    } catch (e) { toast('Failed to load orders', 'error'); }
  }

  // SWITCH TAB
  function switchTab(tab) {
    activeTab = tab;
    document.querySelectorAll('.tab').forEach((b, i) => {
      b.classList.toggle('active', (i === 0 && tab === 'pending') || (i === 1 && tab === 'preparing'));
    });
    renderGrid();
  }

  // RENDER
  function renderGrid() {
    const grid = document.getElementById('kotGrid');
    const empty = document.getElementById('emptyState');

    let orders = kotOrders.filter(k => {
      const hasStatus = k.items.some(i => i.status === activeTab);
      return hasStatus;
    });

    document.getElementById('orderCount').textContent = `${kotOrders.length} Active Order${kotOrders.length !== 1 ? 's' : ''}`;

    if (orders.length === 0) {
      grid.innerHTML = '';
      empty.style.display = 'flex';
      return;
    }
    empty.style.display = 'none';

    grid.innerHTML = orders.map(kot => {
      const elapsed = Math.floor((Date.now() - new Date(kot.createdAt)) / 60000);
      const elapsedClass = elapsed >= 15 ? 'urgent' : elapsed >= 8 ? 'warn' : '';

      const visibleItems = kot.items.filter(i => i.status === activeTab);

      return `
        <div class="kot-card ${elapsed >= 15 ? 'urgent' : ''}">
          <div class="kot-card-header">
            <div>
              <div class="kot-table">Table ${kot.tableNumber}</div>
              <div class="kot-time">${formatTime(kot.createdAt)}</div>
            </div>
            <div class="kot-elapsed ${elapsedClass}">${elapsed}m ago</div>
          </div>
          <div class="kot-items">
            ${visibleItems.map(item => `
              <div class="kot-item">
                <div class="kot-qty">${item.quantity}</div>
                <div class="kot-item-info">
                  <div class="kot-name">
                    <span class="kot-badge">${item.veg ? '🟢' : '🔴'}</span>${item.name}
                  </div>
                </div>
                <button class="status-btn ${item.status}" onclick="cycleStatus(${item.id}, '${item.status}')">
                  ${item.status === 'pending' ? '▶ Start' : item.status === 'preparing' ? '✅ Done' : 'Served'}
                </button>
              </div>
            `).join('')}
          </div>
          <div class="kot-footer">
            <button class="btn-prep" onclick="bulkPrepare(${kot.orderId})">🔥 All Preparing</button>
            <button class="btn-done" onclick="bulkReady(${kot.orderId})">✅ All Done</button>
          </div>
        </div>
      `;
    }).join('');
  }

  // STATUS CYCLE
  async function cycleStatus(itemId, current) {
    const next = current === 'pending' ? 'preparing' : 'ready';
    try {
      await api(`/api/order-items/${itemId}/status`, { method: 'PATCH', body: { status: next } });
      kotOrders.forEach(k => k.items.forEach(i => { if (i.id === itemId) i.status = next; }));
      // Remove served items
      if (next === 'ready') {
        kotOrders.forEach(k => k.items = k.items.filter(i => i.id !== itemId || i.status !== 'ready'));
        kotOrders = kotOrders.filter(k => k.items.length > 0);
      }
      renderGrid();
      toast(`Item → ${next.toUpperCase()}`);
    } catch { toast('Update failed', 'error'); }
  }

  async function bulkPrepare(orderId) {
    const kot = kotOrders.find(k => k.orderId === orderId);
    if (!kot) return;
    for (const item of kot.items.filter(i => i.status === 'pending')) {
      await api(`/api/order-items/${item.id}/status`, { method: 'PATCH', body: { status: 'preparing' } });
      item.status = 'preparing';
    }
    renderGrid();
    toast('All items → PREPARING');
  }

  async function bulkReady(orderId) {
    const kot = kotOrders.find(k => k.orderId === orderId);
    if (!kot) return;
    for (const item of kot.items.filter(i => i.status !== 'ready')) {
      await api(`/api/order-items/${item.id}/status`, { method: 'PATCH', body: { status: 'ready' } });
      item.status = 'ready';
    }
    kotOrders = kotOrders.filter(k => k.items.some(i => i.status !== 'ready'));
    renderGrid();
    toast('✅ Order Complete — Table notified!');
  }

  // TOAST
  function toast(msg, type = 'success') {
    const div = document.createElement('div');
    div.className = `toast ${type}`;
    div.textContent = msg;
    document.getElementById('toastWrap').appendChild(div);
    setTimeout(() => div.remove(), 3000);
  }

  // SOCKETS
  socket.on('kitchen:kot', data => {
    const existing = kotOrders.find(k => k.orderId === data.orderId);
    if (existing) {
      existing.items = [...existing.items, ...data.items];
    } else {
      kotOrders.push({ orderId: data.orderId, tableNumber: data.tableNumber, items: data.items, createdAt: data.timestamp });
    }
    renderGrid();
    toast(`🔔 New Order — Table ${data.tableNumber}! (${data.items.length} items)`, 'warn');
  });

  socket.on('order:paid', data => {
    kotOrders = kotOrders.filter(k => k.tableNumber !== data.tableNumber);
    renderGrid();
  });
</script>
</body>
</html>
